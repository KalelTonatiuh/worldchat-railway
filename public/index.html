<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorldChat MK-II — Open Channel</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=VT323&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: radial-gradient(ellipse at 50% 60%, #3a2010 0%, #1a0a02 60%, #0a0402 100%);
      font-family: 'Courier Prime', monospace;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 16px;
    }

    .machine {
      width: 100%;
      max-width: 700px;
      background: linear-gradient(160deg, #6b4226 0%, #4a2c12 40%, #3a2010 100%);
      border-radius: 20px;
      border: 3px solid #8a6040;
      box-shadow:
        inset 0 2px 4px rgba(255,200,100,0.15),
        inset 0 -3px 6px rgba(0,0,0,0.5),
        0 20px 60px rgba(0,0,0,0.9),
        0 2px 0 #9a7050;
      padding: 22px;
    }

    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .label-plate {
      background: linear-gradient(135deg, #d4b483, #b89060, #d4b483);
      border-radius: 6px;
      padding: 6px 16px;
      border: 1.5px solid #8a6830;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.35), 0 2px 5px rgba(0,0,0,0.5);
      font-family: 'Special Elite', cursive;
      font-size: 14px;
      color: #3a2208;
      letter-spacing: 3px;
      text-transform: uppercase;
      user-select: none;
    }

    .indicator-row { display: flex; gap: 10px; align-items: center; }

    .led {
      width: 11px; height: 11px;
      border-radius: 50%;
      border: 1.5px solid rgba(0,0,0,0.4);
    }
    .led.green  { background: #4eff91; box-shadow: 0 0 8px #4eff91; }
    .led.amber  { background: #ffb830; box-shadow: 0 0 8px #ffb830; animation: blink 1.8s infinite; }
    .led.red    { background: #ff4444; box-shadow: 0 0 6px #ff4444; }
    .led.off    { background: #2a1a08; box-shadow: none; }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    .screen-frame {
      background: linear-gradient(135deg, #2a2018, #1a1408, #2a2018);
      border-radius: 12px;
      border: 3px solid #1a1008;
      box-shadow:
        inset 0 0 40px rgba(0,0,0,0.9),
        inset 0 2px 4px rgba(0,0,0,0.7),
        0 2px 0 #6a4828;
      padding: 4px;
      margin-bottom: 18px;
    }

    .screen-inner {
      background: #0a160a;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #1a2a1a;
      position: relative;
    }

    .screen-scanlines {
      position: absolute; inset: 0;
      background: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(0,0,0,0.1) 3px, rgba(0,0,0,0.1) 4px
      );
      pointer-events: none; z-index: 5; border-radius: 8px;
    }

    .screen-vignette {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 50%, transparent 60%, rgba(0,0,0,0.5) 100%);
      pointer-events: none; z-index: 4; border-radius: 8px;
    }

    .chat-header {
      background: #080f08;
      padding: 7px 16px;
      border-bottom: 1px solid #1a3a1a;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: relative; z-index: 6;
    }

    .chat-header .title {
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: #4eff91;
      letter-spacing: 3px;
      text-shadow: 0 0 10px #4eff91;
    }

    .conn-status {
      font-family: 'VT323', monospace;
      font-size: 14px;
      letter-spacing: 1px;
    }
    .conn-status.live        { color: #4eff91; text-shadow: 0 0 6px #4eff91; }
    .conn-status.connecting  { color: #ffb830; text-shadow: 0 0 6px #ffb830; }
    .conn-status.error       { color: #ff5555; text-shadow: 0 0 6px #ff5555; }

    .messages {
      height: 320px;
      overflow-y: auto;
      padding: 12px 16px;
      display: flex;
      flex-direction: column;
      gap: 5px;
      position: relative; z-index: 3;
      scroll-behavior: smooth;
    }

    .messages::-webkit-scrollbar { width: 5px; }
    .messages::-webkit-scrollbar-track { background: #080f08; }
    .messages::-webkit-scrollbar-thumb { background: #1a4a2a; border-radius: 3px; }

    .msg {
      font-family: 'VT323', monospace;
      font-size: 16px;
      line-height: 1.45;
      word-break: break-word;
      animation: fadeIn 0.2s ease;
    }
    @keyframes fadeIn { from { opacity:0; transform:translateY(3px); } to { opacity:1; transform:none; } }

    .msg .ts   { color: #1a5a30; font-size: 13px; }
    .msg .flag { font-size: 13px; margin: 0 2px; }
    .msg .nick { color: #4eff91; text-shadow: 0 0 6px rgba(78,255,145,0.4); }
    .msg .nick.own { color: #ffdd44; text-shadow: 0 0 8px rgba(255,220,60,0.5); }
    .msg .body { color: #3acc78; }
    .msg.own .body { color: #ffe878; }
    .msg.system .body { color: #1a7040; font-style: italic; }
    .msg.error-msg .body { color: #ff7050; font-style: italic; }

    /* Controls panel */
    .controls-section {
      background: linear-gradient(160deg, #5a3820, #3a2210, #2e1a0c);
      border-radius: 12px;
      border: 2px solid #2a1508;
      box-shadow:
        inset 0 1px 3px rgba(255,180,80,0.1),
        inset 0 -2px 4px rgba(0,0,0,0.4);
      padding: 14px 16px;
    }

    .field-row {
      display: flex;
      gap: 10px;
      margin-bottom: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .field-label {
      font-family: 'Special Elite', cursive;
      font-size: 11px;
      color: #c8a878;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      white-space: nowrap;
      user-select: none;
    }

    .retro-input {
      background: linear-gradient(180deg, #1a0e04, #100802);
      border: 2px solid #5a3a18;
      border-radius: 5px;
      color: #e8c878;
      font-family: 'VT323', monospace;
      font-size: 16px;
      padding: 5px 10px;
      outline: none;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
      caret-color: #ffdd44;
      letter-spacing: 1px;
      min-width: 0;
    }
    .retro-input:focus { border-color: #c8a030; box-shadow: inset 0 2px 4px rgba(0,0,0,0.7), 0 0 8px rgba(200,160,48,0.25); }
    .retro-input::placeholder { color: #5a4020; }

    .msg-row { display: flex; gap: 10px; align-items: flex-end; }

    .retro-textarea {
      flex: 1;
      background: linear-gradient(180deg, #1a0e04, #100802);
      border: 2px solid #5a3a18;
      border-radius: 5px;
      color: #e8c878;
      font-family: 'VT323', monospace;
      font-size: 17px;
      padding: 8px 10px;
      outline: none;
      resize: none;
      height: 54px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
      caret-color: #ffdd44;
      letter-spacing: 1px;
      line-height: 1.4;
    }
    .retro-textarea:focus { border-color: #c8a030; box-shadow: inset 0 2px 4px rgba(0,0,0,0.7), 0 0 8px rgba(200,160,48,0.25); }
    .retro-textarea::placeholder { color: #5a4020; }

    .send-btn {
      background: linear-gradient(160deg, #8a5a28, #5a3810, #4a2c08);
      border: 2px solid #9a7040;
      border-radius: 8px;
      color: #ffd878;
      font-family: 'Special Elite', cursive;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 0 16px;
      height: 54px;
      cursor: pointer;
      box-shadow:
        inset 0 2px 3px rgba(255,200,100,0.2),
        inset 0 -2px 4px rgba(0,0,0,0.4),
        0 4px 8px rgba(0,0,0,0.5),
        0 1px 0 #b08040;
      transition: background 0.1s, transform 0.08s, box-shadow 0.08s;
      white-space: nowrap;
      line-height: 1.4;
      text-align: center;
    }
    .send-btn:hover:not(:disabled) { background: linear-gradient(160deg, #9a6a38, #6a4820, #5a3818); }
    .send-btn:active:not(:disabled) {
      box-shadow: inset 0 3px 6px rgba(0,0,0,0.6), 0 1px 3px rgba(0,0,0,0.4);
      transform: translateY(2px);
    }
    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .sm-btn {
      height: 32px; padding: 0 12px;
      font-size: 10px; letter-spacing: 1px;
    }

    .bottom-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 14px;
    }

    .rivet-row { display: flex; gap: 20px; }
    .rivet {
      width: 13px; height: 13px;
      background: radial-gradient(circle at 35% 35%, #d4c4a8, #8a7860, #4a3820);
      border-radius: 50%;
      box-shadow: inset 0 1px 2px rgba(255,255,255,0.3), 0 2px 4px rgba(0,0,0,0.6);
    }

    .stats-display {
      background: #080c06;
      border: 1.5px solid #1a3a12;
      border-radius: 5px;
      padding: 4px 12px;
      font-family: 'VT323', monospace;
      font-size: 14px;
      color: #1a6a38;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
      text-align: center;
    }
    .stats-display .hi { color: #4eff91; text-shadow: 0 0 6px #4eff91; }

    /* Setup overlay */
    #setup-overlay {
      position: fixed; inset: 0;
      background: rgba(8,4,2,0.94);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
      padding: 20px;
    }

    .setup-box {
      background: linear-gradient(160deg, #5a3820, #3a2210);
      border: 2px solid #8a6040;
      border-radius: 14px;
      padding: 28px 30px;
      max-width: 400px;
      width: 100%;
      box-shadow: 0 20px 60px rgba(0,0,0,0.9);
    }

    .setup-title {
      font-family: 'Special Elite', cursive;
      font-size: 22px;
      color: #d4b483;
      letter-spacing: 2px;
      text-align: center;
      margin-bottom: 4px;
    }
    .setup-sub {
      font-family: 'VT323', monospace;
      font-size: 15px;
      color: #3acc78;
      text-align: center;
      letter-spacing: 2px;
      margin-bottom: 22px;
      text-shadow: 0 0 6px rgba(78,255,145,0.4);
    }

    .setup-field { margin-bottom: 16px; }
    .setup-field label {
      display: block;
      font-family: 'Special Elite', cursive;
      font-size: 11px;
      color: #c8a878;
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }
    .setup-field input, .setup-field select {
      width: 100%;
      background: linear-gradient(180deg, #1a0e04, #100802);
      border: 2px solid #5a3a18;
      border-radius: 5px;
      color: #e8c878;
      font-family: 'VT323', monospace;
      font-size: 18px;
      padding: 8px 12px;
      outline: none;
      letter-spacing: 1px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
      caret-color: #ffdd44;
    }
    .setup-field input:focus, .setup-field select:focus { border-color: #c8a030; }
    .setup-field select option { background: #2a1a08; color: #e8c878; }
    .setup-hint {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: #5a7050;
      margin-top: 4px;
    }

    .setup-btn {
      width: 100%;
      background: linear-gradient(160deg, #8a5a28, #5a3810, #4a2c08);
      border: 2px solid #9a7040;
      border-radius: 8px;
      color: #ffd878;
      font-family: 'Special Elite', cursive;
      font-size: 14px;
      letter-spacing: 2px;
      text-transform: uppercase;
      padding: 12px;
      cursor: pointer;
      margin-top: 8px;
      box-shadow: inset 0 2px 3px rgba(255,200,100,0.2), 0 4px 10px rgba(0,0,0,0.5);
      transition: background 0.1s, transform 0.08s;
    }
    .setup-btn:hover { background: linear-gradient(160deg, #9a6a38, #6a4820, #5a3818); }
    .setup-btn:active { transform: translateY(1px); }

    @media (max-width: 480px) {
      .machine { padding: 14px; }
      .messages { height: 260px; }
      .label-plate { font-size: 11px; letter-spacing: 2px; padding: 5px 10px; }
    }
  </style>
</head>
<body>

<!-- Setup overlay -->
<div id="setup-overlay">

<!-- Machine -->
<div class="machine">
  <div class="top-bar">
    <div class="label-plate">WorldChat MK-II</div>
    <div class="indicator-row">
      <div class="led off"   id="led-conn"      title="Connection"></div>
      <div class="led amber" id="led-activity"  title="Activity"></div>

  <div class="screen-frame">
    <div class="screen-inner">
      <div class="screen-scanlines"></div>

        <span class="conn-status connecting" id="conn-status">CONNECTING…</span>

      <span class="field-label" style="margin-left:8px;">Flag:</span>

      <button class="send-btn sm-btn" style="margin-left:auto;" onclick="document.getElementById('setup-overlay').style.display='flex';">CHANGE</button>

      <textarea class="retro-textarea" id="msg-input" placeholder="type your message… enter to send" maxlength="400" disabled></textarea>
      <button class="send-btn" id="send-btn" disabled>SEND<br>▶▶</button>
    </div>
  </div>

  <div class="bottom-bar">
    <div class="rivet-row">
      <div class="rivet"></div><div class="rivet"></div><div class="rivet"></div>
    </div>

      ONLINE: <span class="hi" id="online-count">—</span>
      &nbsp;|&nbsp;
      MSGS: <span class="hi" id="msg-count">0</span>
    </div>
    <div class="rivet-row">
      <div class="rivet"></div><div class="rivet"></div><div class="rivet"></div>
    </div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
// When served from Railway, connect back to the same host over WSS.
// For local dev, fall back to ws://localhost:3000.
const WS_URL = (() => {
  const loc = window.location;
  if (loc.hostname === 'localhost' || loc.hostname === '127.0.0.1') {
    return `ws://${loc.host}`;
  }
  return `wss://${loc.host}`;
})();

// ── State ─────────────────────────────────────────────────────────────────────
let ws       = null;
let handle   = '';
let flag     = '🌍';
let joined   = false;
let msgCount = 0;
let reconnectDelay = 1500;

// ── DOM ───────────────────────────────────────────────────────────────────────
const messagesEl   = document.getElementById('messages');
const msgInput     = document.getElementById('msg-input');
const sendBtn      = document.getElementById('send-btn');
const connStatus   = document.getElementById('conn-status');
const ledConn      = document.getElementById('led-conn');
const ledActivity  = document.getElementById('led-activity');
const onlineCountEl = document.getElementById('online-count');
const msgCountEl   = document.getElementById('msg-count');

// ── Helpers ───────────────────────────────────────────────────────────────────
function nowUTC() {
  const d = new Date();
  return d.getUTCHours().toString().padStart(2,'0') + ':' +
         d.getUTCMinutes().toString().padStart(2,'0') + ' UTC';
}

function flashActivity() {
  ledActivity.style.background = '#4eff91';
  ledActivity.style.boxShadow  = '0 0 8px #4eff91';
  ledActivity.style.animation  = 'none';
  setTimeout(() => {
    ledActivity.style.background = '';
    ledActivity.style.boxShadow  = '';
    ledActivity.style.animation  = '';
  }, 300);
}

function setStatus(label, cls) {
  connStatus.textContent  = label;
  connStatus.className    = 'conn-status ' + cls;
  ledConn.className       = 'led ' + (cls === 'live' ? 'green' : 'off');
}

function setEnabled(on) {
  msgInput.disabled = !on;
  sendBtn.disabled  = !on;
}

// ── Render ────────────────────────────────────────────────────────────────────
function renderMsg(data) {
  msgCount++;
  msgCountEl.textContent = msgCount;
  flashActivity();

  const div = document.createElement('div');

  if (data.type === 'system') {
    div.className = 'msg system';
    div.innerHTML = `<span class="ts">[${nowUTC()}]</span> <span class="body">— ${data.text} —</span>`;
  } else if (data.type === 'error') {
    div.className = 'msg error-msg';
    div.innerHTML = `<span class="body">⚠ ${data.text}</span>`;
  } else {
    const own = !!data.own;
    div.className = 'msg' + (own ? ' own' : '');
    div.innerHTML =
      `<span class="ts">[${nowUTC()}]</span> ` +
      `<span class="flag">${data.flag || '🌍'}</span> ` +
      `<span class="nick${own?' own':''}">${data.handle}:</span> ` +
      `<span class="body">${data.text}</span>`;
  }

  messagesEl.appendChild(div);
  messagesEl.scrollTop = messagesEl.scrollHeight;
}

// ── WebSocket ─────────────────────────────────────────────────────────────────
function connect() {
  setStatus('CONNECTING…', 'connecting');

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    reconnectDelay = 1500;
    setStatus('LIVE', 'live');
    setEnabled(true);

    if (handle) {
      ws.send(JSON.stringify({ type: 'join', handle, flag }));
      joined = true;
    }
  };

  ws.onmessage = ({ data }) => {
    let msg;
    try { msg = JSON.parse(data); } catch { return; }

    if (msg.type === 'history') {
      msg.messages.forEach(m => renderMsg(m));
      return;
    }

    if (msg.type === 'online') {
      onlineCountEl.textContent = msg.count;
      return;
    }

    renderMsg(msg);
  };

  ws.onclose = () => {
    setStatus('DISCONNECTED', 'error');
    setEnabled(false);
    joined = false;
    // Exponential back-off reconnect
    setTimeout(() => {
      reconnectDelay = Math.min(reconnectDelay * 1.5, 15000);
      connect();
    }, reconnectDelay);
  };

  ws.onerror = () => ws.close();
}

// ── Send ──────────────────────────────────────────────────────────────────────
function sendMessage() {
  const text = msgInput.value.trim();
  if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
  ws.send(JSON.stringify({ type: 'msg', text }));
  msgInput.value = '';
  msgInput.focus();
}

sendBtn.addEventListener('click', sendMessage);
msgInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Enter chat ────────────────────────────────────────────────────────────────
function enterChat() {
  const raw = document.getElementById('setup-handle').value.trim();
  handle = raw.replace(/[^a-zA-Z0-9_\-\.]/g, '').slice(0, 20) || 'anon_' + Math.floor(Math.random()*9999);
  flag   = document.getElementById('setup-flag').value || '🌍';

  document.getElementById('nick-display').value = handle;
  document.getElementById('flag-display').textContent = flag;
  document.getElementById('setup-overlay').style.display = 'none';

  localStorage.setItem('wc_handle', handle);
  localStorage.setItem('wc_flag', flag);

  // If already connected, send join now
  if (ws && ws.readyState === WebSocket.OPEN && !joined) {
    ws.send(JSON.stringify({ type: 'join', handle, flag }));
    joined = true;
  }
}

// ── Restore saved profile ─────────────────────────────────────────────────────
const savedHandle = localStorage.getItem('wc_handle');
const savedFlag   = localStorage.getItem('wc_flag');
if (savedHandle) document.getElementById('setup-handle').value = savedHandle;
if (savedFlag)   document.getElementById('setup-flag').value   = savedFlag;

// ── Boot ──────────────────────────────────────────────────────────────────────
connect();
</script>
